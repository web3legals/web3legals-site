name: Build SEO Blog Pages

on:
  push:
    branches: [main]
    paths:
      - 'blog/*.md'
      - '.github/workflows/build-seo.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build static HTML pages
        run: python .github/scripts/build_blog.py

      - name: Commit and push built pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Web3Legals SEO Builder"
          git add blog/*.html sitemap.xml robots.txt
          git diff --staged --quiet || git commit -m "SEO: Auto-build HTML pages from markdown"
          git push
