name: Cleanup MD Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete all .md files from blog folder
        run: |
          find blog/ -name "*.md" -delete
          echo "Deleted all .md files from blog/"

      - name: Commit and push
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No .md files found."
          else
            git commit -m "Cleanup: Remove all .md files from blog/"
            git push
          fi
