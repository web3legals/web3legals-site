name: Fix CSS Paths in Old Articles

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix relative CSS paths to absolute
        run: |
          cd blog
          for f in *.html; do
            sed -i 's|href="../css/style.css"|href="/css/style.css"|g' "$f"
            sed -i 's|href="../js/main.js"|src="/js/main.js"|g' "$f"
            sed -i 's|src="../js/main.js"|src="/js/main.js"|g' "$f"
            sed -i 's|href="../index.html"|href="/index.html"|g' "$f"
            sed -i 's|href="../services.html"|href="/services.html"|g' "$f"
            sed -i 's|href="../about.html"|href="/about.html"|g' "$f"
            sed -i 's|href="../blog.html"|href="/blog.html"|g' "$f"
            sed -i 's|href="../contact.html"|href="/contact.html"|g' "$f"
          done
          echo "Done fixing paths"

      - name: Commit and push
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to fix."
          else
            git commit -m "Fix: Convert relative paths to absolute in all blog articles"
            git push
          fi
