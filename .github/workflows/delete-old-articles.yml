name: Delete Old Broken Articles

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old broken articles
        run: |
          cd blog
          rm -f us-senate-passes-housing-bill-with-cbdc-ban-until-2030.html
          rm -f censorship-or-compliance-amazon-s-openai-film-pullout-sparks-legal-debate.html
          rm -f cftc-s-dual-regulatory-vision-perpetual-futures-face-differentiated-rules.html
          rm -f congressional-prediction-market-ban-legal-compliance-and-insider-trading-prevent.html
          rm -f crypto-lobby-s-urgent-plea-tax-staking-mining-rewards-only-upon-sale.html
          rm -f eu-committee-advances-digital-euro-legal-framework-takes-shape-with-key-safeguar.html
          rm -f legal-crossroads-boe-eases-stablecoin-reserves-imposes-p40b-issuance-cap.html
          rm -f mica-2-0-consultation-europe-s-legal-blueprint-for-stablecoins-and-defi.html
          rm -f mica-s-shadow-binance-s-eu-compliance-challenge-amidst-low-euro-volume.html
          rm -f ooki-dao-cftc-explained.html
          rm -f orissa-high-court-s-crypto-ruling-what-it-means-for-indian-web3-founders.html
          rm -f ripple-gains-preliminary-mica-license-ahead-of-july-1-eu-deadline.html
          rm -f whitebit-secures-mica-license-in-austria-ahead-of-july-1-eu-deadline.html
          echo "Done deleting old broken articles"

      - name: Commit and push
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to delete."
          else
            git commit -m "Cleanup: Delete old broken article files"
            git push
          fi
