name: Crypto Radar — Auto Blog Publisher

on:
  schedule:
    - cron: "0 7 * * *"   # Daily 7:00 AM UTC
  workflow_dispatch:        # Manual trigger from Actions UI

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45    # Extra time for retry back-offs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            google-genai \
            newspaper3k \
            lxml \
            lxml_html_clean \
            requests \
            Pillow \
            nltk

          # NLTK data for newspaper3k tokenisation
          python -c "
          import nltk
          nltk.download('punkt',      quiet=True)
          nltk.download('punkt_tab',  quiet=True)
          nltk.download('stopwords',  quiet=True)
          "

      - name: Run Crypto Radar
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python .github/scripts/crypto_radar.py

      - name: Commit and push new articles
        run: |
          git config user.name  "Web3Legals Bot"
          git config user.email "bot@web3legals.com"

          git add \
            blog/ \
            .seen_articles.json \
            .all_articles.json

          if git diff --cached --quiet; then
            echo "No new articles — nothing to commit."
          else
            ARTICLE_COUNT=$(python -c "
          import json, os
          data = json.load(open('.all_articles.json')) if os.path.exists('.all_articles.json') else []
          print(len(data))
          ")
            git commit -m "chore(blog): auto-publish — ${ARTICLE_COUNT} articles [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Pushed. Cloudflare Pages will deploy automatically."
          fi
