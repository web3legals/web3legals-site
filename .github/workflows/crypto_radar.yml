name: Crypto Radar — Phase 1 Hybrid (Cloudflare AI Gateway + D1)

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install newspaper3k lxml lxml_html_clean requests Pillow nltk
          python -c "
          import nltk
          nltk.download('punkt', quiet=True)
          nltk.download('punkt_tab', quiet=True)
          nltk.download('stopwords', quiet=True)
          "

      - name: Run Crypto Radar
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_WORKER_SECRET: ${{ secrets.CF_WORKER_SECRET }}
          CF_AI_GATEWAY_URL: ${{ secrets.CF_AI_GATEWAY_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python .github/scripts/crypto_radar.py

      - name: Commit and push new articles
        run: |
          git config user.name  "Web3Legals Bot"
          git config user.email "bot@web3legals.com"
          git add blog/ .all_articles.json .seen_articles.json || true
          if git diff --cached --quiet; then
            echo "No new articles — nothing to commit."
          else
            TOTAL=$(python -c "
          import json, os
          d = json.load(open('.all_articles.json')) if os.path.exists('.all_articles.json') else []
          print(len(d))
          " 2>/dev/null || echo "?")
            git commit -m "blog: auto-publish — ${TOTAL} total articles [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Pushed. Cloudflare Pages deploying…"
          fi
