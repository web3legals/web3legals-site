backend:
  name: github
  repo: web3legals/web3legals-site
  branch: main
  base_url: https://sveltia-cms-auth.pages.dev
  auth_endpoint: /api/auth
  app_id: Ov23livfK4HcwXP3hGCs

site_url: https://web3legals.com
display_url: https://web3legals.com

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Articles"
    label_singular: "Article"
    folder: "blog"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The article headline — make it specific and keyword-rich"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "MMMM YYYY"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Token Law", value: "token" }
          - { label: "DAO Law", value: "dao" }
          - { label: "Compliance", value: "compliance" }
          - { label: "Startup Law", value: "startup" }
          - { label: "NFT Law", value: "defi" }
          - { label: "DeFi", value: "defi" }

      - label: "Badge Style"
        name: "badge"
        widget: "select"
        options:
          - { label: "Gold (Token/Startup)", value: "badge-gold" }
          - { label: "Teal (DAO/NFT)", value: "badge-teal" }
          - { label: "White (Compliance)", value: "badge-white" }

      - label: "Read Time (minutes)"
        name: "readtime"
        widget: "number"
        default: 8
        value_type: "int"
        min: 1
        max: 30

      - label: "Excerpt (short description)"
        name: "excerpt"
        widget: "text"
        hint: "1-2 sentences shown on the blog listing page and used as meta description"

      - label: "Article Body"
        name: "body"
        widget: "markdown"
        hint: "Write your full article here. Use headings, bullet points, and bold text freely."
